<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Arivu AI</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  font-family: 'Segoe UI', system-ui;
  background: linear-gradient(135deg,#eef2ff,#f8fafc);
  margin: 0;
  color: #1e293b;
}

/* Container */
.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

/* Header */
h1 {
  text-align: center;
  color: #2563eb;
  margin-bottom: 5px;
}

.tagline {
  text-align: center;
  color: #64748b;
  margin-bottom: 20px;
}

/* Card */
.card {
  background: white;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  margin-bottom: 20px;
}

/* Inputs */
select, textarea {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #cbd5e1;
  margin-top: 10px;
}

textarea {
  min-height: 80px;
}

/* Upload */
.upload-box {
  border: 2px dashed #93c5fd;
  padding: 20px;
  border-radius: 12px;
  text-align: center;
  cursor: pointer;
  background: #eff6ff;
  color: #2563eb;
  transition: 0.2s;
}

.upload-box:hover {
  background: #dbeafe;
}

/* Preview */
.preview {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 10px;
}

.preview img {
  width: 80px;
  height: 80px;
  border-radius: 8px;
  object-fit: cover;
}

/* Buttons */
button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #2563eb;
  color: white;
  font-weight: bold;
  margin-top: 15px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #1d4ed8;
}

/* Toggle Row */
.row {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.row select, .row button {
  flex: 1;
}

/* Tabs */
.tabs {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.tab {
  flex: 1;
  padding: 10px;
  text-align: center;
  border-radius: 10px;
  background: #e2e8f0;
  cursor: pointer;
  font-size: 14px;
}

.active {
  background: #2563eb;
  color: white;
}

/* Output */
.output {
  margin-top: 15px;
  padding: 15px;
  border-radius: 12px;
  background: #ffffff;
  min-height: 150px;
  line-height: 1.6;
  box-shadow: inset 0 0 0 1px #e2e8f0;
}

/* Loader */
.loader {
  display: flex;
  justify-content: center;
  gap: 6px;
}

.loader div {
  width: 8px;
  height: 8px;
  background: #2563eb;
  border-radius: 50%;
  animation: bounce 0.5s infinite alternate;
}

.loader div:nth-child(2){animation-delay:0.2s}
.loader div:nth-child(3){animation-delay:0.4s}

@keyframes bounce {
  to { transform: translateY(-6px); }
}

/* Language Switch */
.lang-switch {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.lang-switch button {
  flex: 1;
  background: #e2e8f0;
  color: #1e293b;
}

.lang-switch button.active {
  background: #2563eb;
  color: white;
}

</style>
</head>

<body>

<div class="container">

<h1>Arivu AI</h1>
<p class="tagline">Understand lessons instantly — in Kannada & English</p>

<!-- INPUT CARD -->
<div class="card">

<div class="row">
  <select id="mode">
    <option value="student">🎓 Student</option>
    <option value="teacher">👩‍🏫 Teacher</option>
  </select>

  <select id="classLevel">
    <option value="5">Class 5</option>
    <option value="6">Class 6</option>
    <option value="7">Class 7</option>
    <option value="8">Class 8</option>
    <option value="9">Class 9</option>
    <option value="10">Class 10</option>
    <option value="11">Class 11</option>
    <option value="12">Class 12</option>
  </select>
</div>

<select id="syllabus">
  <option>Karnataka State</option>
  <option>CBSE</option>
  <option>ICSE</option>
</select>

<label style="font-size:14px;">
  <input type="checkbox" id="advanced"> Advanced
</label>

<div class="upload-box" onclick="fileInput.click()">
  📷 Upload textbook image
</div>

<input type="file" id="fileInput" hidden multiple accept="image/*">

<div class="preview" id="preview"></div>

<textarea id="doubt" placeholder="Ask your doubt (optional)..."></textarea>

<button onclick="simplify()">✨ Explain Now</button>

</div>

<!-- OUTPUT CARD -->
<div class="card">

<div class="lang-switch">
  <button id="knBtn" class="active" onclick="switchLang('kannada')">Kannada</button>
  <button id="enBtn" onclick="switchLang('english')">English</button>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('summary')">Summary</div>
  <div class="tab" onclick="showTab('explanation')">Explanation</div>
  <div class="tab" onclick="showTab('chapters')">Related</div>
  <div class="tab" onclick="showTab('points')">Key Points</div>
  <div class="tab" onclick="showTab('teacher')">Teacher</div>
</div>

<div class="output" id="output">
Upload a textbook page to begin.
</div>

</div>

</div>

<script src="script.js"></script>

<script>
function switchLang(lang){
  currentLang = lang;

  document.getElementById("knBtn").classList.remove("active");
  document.getElementById("enBtn").classList.remove("active");

  if(lang==="kannada"){
    document.getElementById("knBtn").classList.add("active");
  } else {
    document.getElementById("enBtn").classList.add("active");
  }

  showTab("summary");
}
</script>

</body>
</html>
