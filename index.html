<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arivu</title>

<link rel="manifest" href="manifest.json">
<style>
body {
  font-family: 'Segoe UI', system-ui;
  background: #f8fafc;
  color: #1e293b;
  margin: 0;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
  color: #2563eb;
}

.tagline {
  text-align: center;
  color: #64748b;
  margin-bottom: 20px;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

.upload-box {
  border: 2px dashed #93c5fd;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
  background: #eff6ff;
  color: #2563eb;
}

.preview {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 10px;
}

.preview div {
  position: relative;
}

.preview img {
  width: 80px;
  height: 80px;
  border-radius: 8px;
  object-fit: cover;
}

.remove {
  position: absolute;
  top: -6px;
  right: -6px;
  background: red;
  color: white;
  border-radius: 50%;
  padding: 2px 6px;
  cursor: pointer;
}

textarea {
  width: 100%;
  margin-top: 15px;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #cbd5f5;
}

button {
  margin-top: 15px;
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #2563eb;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.tabs {
  display: flex;
  gap: 10px;
  margin-top: 20px;
  <div class="tab" onclick="showTab('worksheet')">📝 Worksheet</div>
}

.tab {
  flex: 1;
  text-align: center;
  padding: 10px;
  border-radius: 8px;
  background: #e2e8f0;
  cursor: pointer;
}

.active {
  background: #2563eb;
  color: white;
}

.output {
  margin-top: 15px;
  background: white;
  padding: 15px;
  border-radius: 10px;
  min-height: 120px;
  line-height: 1.6;
}

/* Loader */
.loader {
  display: flex;
  justify-content: center;
  gap: 6px;
}

.loader div {
  width: 8px;
  height: 8px;
  background: #2563eb;
  border-radius: 50%;
  animation: bounce 0.5s infinite alternate;
}

.loader div:nth-child(2){animation-delay:0.2s}
.loader div:nth-child(3){animation-delay:0.4s}

@keyframes bounce {
  to { transform: translateY(-6px); }
}
</style>
</head>

<body>

<div class="container">

<h1>Arivu</h1>
<p class="tagline">Understand any lesson, instantly</p>

<div class="card">

<div class="upload-box" onclick="fileInput.click()">
  Upload textbook images
</div>

<input type="file" id="fileInput" hidden multiple accept="image/*">

<div class="preview" id="preview"></div>

<p style="font-size:13px;color:#64748b;">
Upload textbook pages or notes
</p>

<textarea id="doubt" placeholder="Ask your doubt..."></textarea>

<label>
  <input type="radio" name="lang" value="kannada" checked> Kannada
</label>
<label>
  <input type="radio" name="lang" value="english"> English
</label>

<button onclick="simplify()">✨ Simplify</button>

</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('summarize')">📖 Summary</div>
  <div class="tab" onclick="showTab('explain')">🧠 Explanation</div>
  <div class="tab" onclick="showTab('keypoints')">📌 Key Points</div>
</div>

<div class="output" id="output">Start by uploading a lesson.</div>

</div>

<script src="script.js"></script>
</body>
</html>
