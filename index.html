<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Textbook Simplifier</title>

<style>
body {
  font-family: system-ui;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 20px;
}

h1 { color: #38bdf8; }

.container {
  max-width: 700px;
  margin: auto;
}

.upload-box {
  border: 2px dashed #38bdf8;
  padding: 20px;
  border-radius: 10px;
  cursor: pointer;
}

.preview {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 10px;
  justify-content: center;
}

.preview img {
  width: 80px;
  height: 80px;
  object-fit: cover;
  border-radius: 8px;
}

.preview div {
  position: relative;
}

.remove {
  position: absolute;
  top: -5px;
  right: -5px;
  background: red;
  border-radius: 50%;
  cursor: pointer;
  padding: 2px 6px;
}

textarea {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  margin-top: 15px;
}

button {
  margin-top: 15px;
  padding: 12px 20px;
  background: #38bdf8;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

.tabs {
  display: flex;
  margin-top: 20px;
  justify-content: center;
  gap: 10px;
}

.tab {
  padding: 8px 12px;
  background: #1e293b;
  border-radius: 8px;
  cursor: pointer;
}

.active {
  background: #38bdf8;
  color: black;
}

.output {
  margin-top: 15px;
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  text-align: left;
  white-space: pre-wrap;
}
</style>
</head>

<body>

<div class="container">

<h1>📘 Textbook Simplifier</h1>

<div class="upload-box" onclick="document.getElementById('fileInput').click()">
  📤 Upload Photos
</div>

<input type="file" id="fileInput" multiple accept="image/*" hidden>

<div class="preview" id="preview"></div>

<textarea id="doubt" placeholder="Ask your doubt (optional)..."></textarea>

<br>

<label>
  <input type="radio" name="lang" value="kannada" checked> Kannada
</label>
<label>
  <input type="radio" name="lang" value="english"> English
</label>

<br>

<button onclick="simplify()">✨ Simplify</button>

<div class="tabs">
  <div class="tab active" onclick="showTab('summary')">Summary</div>
  <div class="tab" onclick="showTab('explain')">Explain</div>
  <div class="tab" onclick="showTab('points')">Key Points</div>
</div>

<div class="output" id="output">Result will appear here...</div>

</div>

<script src="script.js"></script>

</body>
</html>
